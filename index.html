<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUE X AI 해양과학대학 챌린지 - LIVE LEADERBOARD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:          #06080f;
  --surface:     rgba(255,255,255,0.033);
  --border:      rgba(255,255,255,0.07);
  --gold:        #f5c842;
  --silver:      #a8b4c8;
  --bronze:      #c87d3e;
  --up:          #00ffb3;
  --down:        #ff4d6d;
  --muted:       #4a5568;
  --text:        #dde3f0;

  /* per-division accent colors */
  --elem-c:      #34d399;   /* green  */
  --midd-c:      #818cf8;   /* purple */
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

html,body {
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
}

body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 45% at 15%  50%,  rgba(52,211,153,0.05)  0%,transparent 70%),
    radial-gradient(ellipse 70% 45% at 50%  -5%,  rgba(129,140,248,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 70% 45% at 85%  50%,  rgba(129,140,248,0.05)  0%,transparent 70%);
}
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    radial-gradient(circle 1px at 8%  12%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(circle 1px at 30%  7%, rgba(129,140,248,0.6) 0%,transparent 100%),
    radial-gradient(circle 1px at 58% 20%, rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 1px at 75% 60%, rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(circle 1px at 92% 15%, rgba(52,211,153,0.5)  0%,transparent 100%),
    radial-gradient(circle 1px at 5%  75%, rgba(129,140,248,0.45) 0%,transparent 100%),
    radial-gradient(circle 1px at 45% 85%, rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(circle 1px at 88% 80%, rgba(245,200,66,0.4)  0%,transparent 100%);
}

/* ── APP ── */
#app {
  position:relative; z-index:2;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:2.2rem 1rem 3rem;
}

/* ── HEADER ── */
.hdr { text-align:center; margin-bottom:2rem; }
.hdr-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.4rem,6vw,4.4rem);
  letter-spacing:0.1em; line-height:1;
  background:linear-gradient(160deg,#fff 0%,#a5b4fc 45%,#93e8ff 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 22px rgba(129,140,248,0.4));
}
.hdr-subtitle {
  font-size:clamp(0.7rem,2vw,0.9rem);
  letter-spacing:0.05em;
  color:var(--muted);
  margin-top:0.5rem;
}
.hdr-live {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:0.5rem;
  font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.22em; color:var(--muted);
}
.dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--up); box-shadow:0 0 6px var(--up);
  animation:blink 1.2s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

/* ── TWO-COLUMN GRID ── */
.arena {
  width:100%; max-width:1000px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:1.5rem;
}

/* ── COLUMN ── */
.col { display:flex; flex-direction:column; gap:0; }

.col-head {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:0.9rem 0.6rem 0.8rem;
  border-radius:6px 6px 0 0;
  border:1px solid var(--border); border-bottom:none;
  background:rgba(255,255,255,0.025);
  backdrop-filter:blur(12px);
  margin-bottom:0;
  gap:0.3rem;
}
.col-icon { font-size:1.2rem; line-height:1; }
.col-label {
  font-family:'Bebas Neue',sans-serif; letter-spacing:0.12em;
  font-size:clamp(0.95rem,1.8vw,1.2rem); line-height:1;
}
.col-sub {
  font-family:'Space Mono',monospace; font-size:0.45rem; letter-spacing:0.18em;
  color:var(--muted); text-transform:uppercase;
}

/* per-division accent */
.col[data-div="elem"]  .col-head { border-color:rgba(52,211,153,0.25);  background:rgba(52,211,153,0.05); }
.col[data-div="elem"]  .col-label { color:var(--elem-c); filter:drop-shadow(0 0 8px rgba(52,211,153,0.4)); }
.col[data-div="midd"]  .col-head { border-color:rgba(129,140,248,0.25); background:rgba(129,140,248,0.05); }
.col[data-div="midd"]  .col-label { color:var(--midd-c); filter:drop-shadow(0 0 8px rgba(129,140,248,0.4)); }

/* ── ROW ── */
.row {
  position:relative;
  display:grid;
  grid-template-columns:40px 1fr 60px;
  align-items:center;
  gap:0.6rem;
  padding:0.6rem 0.7rem;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:var(--surface);
  backdrop-filter:blur(20px);
  overflow:hidden;
  transition:
    transform 0.55s cubic-bezier(0.22,1,0.36,1),
    box-shadow 0.4s ease,
    border-color 0.4s ease,
    background 0.4s ease;
  will-change:transform;
  cursor:default;
}
.row:last-child { border-radius:0 0 6px 6px; }
.row:hover { transform:translateX(2px) !important; }

/* 1st row connects to header */
.col-rows .row:first-child { border-top:none; }

/* rank tints (gold/silver/bronze always same) */
.row[data-rank="1"] {
  border-left-color:rgba(245,200,66,0.35); border-right-color:rgba(245,200,66,0.35);
  border-bottom-color:rgba(245,200,66,0.2);
  background:linear-gradient(100deg,rgba(245,200,66,0.08) 0%,transparent 60%),var(--surface);
  box-shadow:0 0 20px rgba(245,200,66,0.08), inset 0 0 20px rgba(245,200,66,0.03);
}
.row[data-rank="2"] {
  border-left-color:rgba(168,180,200,0.2);
  background:linear-gradient(100deg,rgba(168,180,200,0.05) 0%,transparent 60%),var(--surface);
}
.row[data-rank="3"] {
  border-left-color:rgba(200,125,62,0.2);
  background:linear-gradient(100deg,rgba(200,125,62,0.04) 0%,transparent 60%),var(--surface);
}

/* flash on rise */
.row.flash { animation:flashAnim 0.8s ease forwards; }
@keyframes flashAnim {
  0%  { box-shadow:0 0 0 1.5px var(--up), 0 0 22px rgba(0,255,179,0.2); }
  70% { box-shadow:0 0 0 1px rgba(0,255,179,0.15); }
  100%{ }
}
.row.flash::before {
  content:''; position:absolute; top:0; width:35%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,179,0.07),transparent);
  animation:sweep 0.55s ease forwards;
}
@keyframes sweep { from{left:-35%} to{left:110%} }

/* ── RANK CELL ── */
.rank-cell {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; flex-shrink:0;
}
.rank-num {
  font-family:'Bebas Neue',sans-serif; font-size:1.6rem; line-height:1;
}
[data-rank="1"] .rank-num { color:var(--gold);   text-shadow:0 0 12px rgba(245,200,66,0.55); }
[data-rank="2"] .rank-num { color:var(--silver); text-shadow:0 0 8px  rgba(168,180,200,0.4); }
[data-rank="3"] .rank-num { color:var(--bronze); text-shadow:0 0 8px  rgba(200,125,62,0.4); }
.row:not([data-rank="1"]):not([data-rank="2"]):not([data-rank="3"]) .rank-num { color:#4a5568; }

.rank-delta {
  font-family:'Space Mono',monospace; font-size:0.42rem; letter-spacing:0.04em; line-height:1;
}
.rank-delta.up { color:var(--up); }
.rank-delta.dn { color:var(--down); }
.rank-delta.eq { color:var(--muted); }

/* ── MID ── */
.mid { display:flex; flex-direction:column; gap:0.3rem; min-width:0; overflow:hidden; }
.t-name {
  font-weight:600; font-size:clamp(0.75rem,1.3vw,0.95rem);
  color:#e8edf8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  letter-spacing:0.01em;
}
.t-scores {
  font-family:'Space Mono',monospace; font-size:0.42rem; letter-spacing:0.06em;
  color:var(--muted); text-transform:uppercase;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.bar-track {
  height:2px; background:rgba(255,255,255,0.05); border-radius:99px; overflow:hidden; margin-top:0.2rem;
}
.bar-fill {
  height:100%; border-radius:99px;
  transition:width 0.85s cubic-bezier(0.4,0,0.2,1);
}

/* bar colors per division */
.col[data-div="elem"]  [data-rank="1"] .bar-fill { background:linear-gradient(90deg,#059669,var(--elem-c)); box-shadow:0 0 5px rgba(52,211,153,0.5); }
.col[data-div="elem"]  .bar-fill { background:rgba(52,211,153,0.5); }
.col[data-div="midd"]  [data-rank="1"] .bar-fill { background:linear-gradient(90deg,#4f46e5,var(--midd-c)); box-shadow:0 0 5px rgba(129,140,248,0.5); }
.col[data-div="midd"]  .bar-fill { background:rgba(129,140,248,0.5); }

/* ── SCORE CELL ── */
.score-cell { text-align:right; flex-shrink:0; }
.score-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(0.95rem,2vw,1.15rem);
  line-height:1; font-weight:600;
}
.score-lbl {
  font-family:'Space Mono',monospace;
  font-size:0.42rem; letter-spacing:0.06em;
  color:var(--muted); text-transform:uppercase; margin-top:1px;
}

/* ── STATS ── */
.stats {
  display:flex; justify-content:center; gap:2rem;
  margin-top:2.5rem;
  font-family:'Space Mono',monospace; font-size:0.65rem;
  letter-spacing:0.15em; text-transform:uppercase;
}
.stat {
  display:flex; gap:0.5rem; align-items:center;
}
.stat em {
  font-style:normal; color:var(--text); font-weight:700;
}


.empty-row {
  grid-template-columns:1fr;
  min-height:64px;
  justify-items:center;
  color:var(--muted);
  font-family:'Space Mono',monospace;
  font-size:0.55rem;
  letter-spacing:0.08em;
}

#live-text[data-state="err"] { color:var(--down); }
#live-text[data-state="busy"] { color:var(--muted); }
#live-text[data-state="ok"] { color:var(--up); }

/* responsive */
@media (max-width:800px) {
  .arena {
    grid-template-columns:1fr;
    gap:1rem;
  }
  .score-val {
    font-size:1rem;
  }
}

</style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">LIVE LEADERBOARD</div>
    <div class="hdr-subtitle">2026 BLUE X AI 해양과학대학 챌린지</div>
    <div class="hdr-live">
      <span class="dot"></span>
      <span id="live-text" data-state="busy">CONNECTING</span>
    </div>
  </div>

  <div class="arena">
    <!-- 초등부 컬럼 -->
    <div class="col" data-div="elem">
      <div class="col-head">
        <div class="col-icon">🐟</div>
        <div class="col-label">초등부</div>
        <div class="col-sub">Elementary Division</div>
      </div>
      <div class="col-rows" id="col-elem"></div>
    </div>

    <!-- 중등부 컬럼 -->
    <div class="col" data-div="midd">
      <div class="col-head">
        <div class="col-icon">🐙</div>
        <div class="col-label">중등부</div>
        <div class="col-sub">Middle Division</div>
      </div>
      <div class="col-rows" id="col-midd"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">TEAMS <em id="s-teams">—</em></div>
    <div class="stat">SYNC <em id="s-tick">0</em></div>
  </div>
</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFIG
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const API_URL = "https://script.google.com/macros/s/AKfycbxmEH7l4Ph9f8lmtBStHi-RCrt9eLH8yxYxQku6J1C9UlTfkX2XmoZH0_f54T1G4w3e/exec";
const POLL_MS = 2000;
const REQUEST_TIMEOUT_MS = 10000;
const TOTAL_MAX_SCORE = 1000;

const DIVS = [
  { key:'elem', el:'col-elem' },
  { key:'midd', el:'col-midd' },
];

const prevRank  = { elem:{}, midd:{} };
const dispScore = { elem:{}, midd:{} };
const rafs      = { elem:{}, midd:{} };
let ticks = 0;
let busy = false;
let pollTimer = null;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   API
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function apiFetch() {
  if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(?:\?.*)?$/.test(API_URL)) {
    throw new Error('API_URL이 올바른 Apps Script /exec 주소가 아닙니다.');
  }

  const url = new URL(API_URL);
  url.searchParams.set('action', 'init');
  url.searchParams.set('_', Date.now().toString());

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

  try {
    const res = await fetch(url.toString(), {
      method:'GET',
      cache:'no-store',
      redirect:'follow',
      signal:controller.signal
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const json = await res.json();
    if (json && json.error) throw new Error(json.error);

    return {
      elementary: normalizeTeams(json && json.elementary),
      middle: normalizeTeams(json && json.middle)
    };
  } catch (error) {
    if (error && error.name === 'AbortError') {
      throw new Error('데이터 요청 시간이 초과되었습니다.');
    }
    throw error;
  } finally {
    clearTimeout(timeout);
  }
}

function normalizeTeams(value) {
  if (!Array.isArray(value)) return [];

  return value.map((team, index) => {
    const m1 = finiteNumber(team && team.m1);
    const m21 = finiteNumber(team && team.m21);
    const m22 = finiteNumber(team && team.m22);
    const m23 = finiteNumber(team && team.m23);
    const number = String((team && (team.number || team.id)) || '').trim();
    const name = String((team && team.name) || number || `팀 ${index + 1}`).trim();

    return {
      id: String((team && team.id) || number || `${name}-${index}`).trim(),
      number,
      name,
      m1,
      m21,
      m22,
      m23,
      total: finiteNumber(team && team.total, m1 + m21 + m22 + m23)
    };
  }).filter(team => team.id && team.name);
}

function finiteNumber(value, fallback = 0) {
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const esc = value => String(value ?? '')
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;')
  .replace(/'/g,'&#039;');

function formatScore(value) {
  const number = finiteNumber(value);
  return Number.isInteger(number) ? String(number) : number.toFixed(1).replace(/\.0$/, '');
}

function compareTeamId(a, b) {
  return String(a).localeCompare(String(b), 'ko', { numeric:true, sensitivity:'base' });
}

function setStatus(state, text) {
  const dot = document.querySelector('.dot');
  const label = document.getElementById('live-text');
  const colors = { ok:'var(--up)', err:'var(--down)', busy:'#556' };
  const color = colors[state] || colors.busy;

  if (dot) {
    dot.style.background = color;
    dot.style.boxShadow = `0 0 6px ${color}`;
  }
  if (label) {
    label.dataset.state = state;
    label.textContent = text || (state === 'ok' ? 'LIVE' : state === 'err' ? 'OFFLINE' : 'SYNCING');
  }
}

function countUp(divKey, id, from, to, el) {
  if (rafs[divKey][id]) cancelAnimationFrame(rafs[divKey][id]);
  if (from === to) {
    el.textContent = formatScore(to);
    dispScore[divKey][id] = to;
    return;
  }

  const t0 = performance.now();
  const duration = 600;
  const step = now => {
    const progress = Math.min(1, (now - t0) / duration);
    const eased = 1 - Math.pow(1 - progress, 3);
    const value = from + (to - from) * eased;
    el.textContent = formatScore(value);

    if (progress < 1) {
      rafs[divKey][id] = requestAnimationFrame(step);
    } else {
      el.textContent = formatScore(to);
      dispScore[divKey][id] = to;
      delete rafs[divKey][id];
    }
  };
  rafs[divKey][id] = requestAnimationFrame(step);
}

function snapCol(container) {
  const positions = {};
  container.querySelectorAll('.row[data-id]').forEach(el => {
    positions[el.dataset.id] = el.getBoundingClientRect().top;
  });
  return positions;
}

function cleanupRemovedState(divKey, activeIds) {
  [prevRank[divKey], dispScore[divKey], rafs[divKey]].forEach(store => {
    Object.keys(store).forEach(id => {
      if (!activeIds.has(id)) {
        if (store === rafs[divKey] && store[id]) cancelAnimationFrame(store[id]);
        delete store[id];
      }
    });
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RENDER ONE COLUMN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderCol(divKey, containerId, teams) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const list = [...teams].sort((a, b) => (b.total - a.total) || compareTeamId(a.id, b.id));
  const activeIds = new Set(list.map(team => team.id));
  cleanupRemovedState(divKey, activeIds);

  if (!list.length) {
    container.innerHTML = '<div class="row empty-row">등록된 팀이 없습니다</div>';
    return;
  }

  const empty = container.querySelector('.empty-row');
  if (empty) empty.remove();

  const first = snapCol(container);
  const existing = {};
  container.querySelectorAll('.row[data-id]').forEach(el => { existing[el.dataset.id] = el; });

  Object.keys(existing).forEach(id => {
    if (!activeIds.has(id)) existing[id].remove();
  });

  let previousRankedScore = null;
  let competitionRank = 0;

  list.forEach((team, index) => {
    const id = team.id;
    const score = team.total;
    const isRanked = score > 0;

    // 공동순위 방식: 50, 50, 20점이면 1위, 1위, 3위.
    // 총점이 0점이면 순위를 부여하지 않고 "-"로 표시한다.
    if (isRanked && (previousRankedScore === null || score !== previousRankedScore)) {
      competitionRank = index + 1;
    }
    const rank = isRanked ? competitionRank : null;
    if (isRanked) previousRankedScore = score;
    const pct = Math.max(0, Math.min(100, (score / TOTAL_MAX_SCORE) * 100));
    let row = existing[id];

    if (!row) {
      row = document.createElement('div');
      row.className = 'row';
      row.dataset.id = id;
      row.innerHTML = rowHTML(team, rank, score, pct);
      dispScore[divKey][id] = score;
    } else {
      row.querySelector('.t-name').textContent = team.name;
      row.querySelector('.t-scores').textContent = scoresText(team);
      row.querySelector('.bar-fill').style.width = pct + '%';

      const scoreEl = row.querySelector('.score-val');
      const from = dispScore[divKey][id] ?? score;
      if (from !== score) countUp(divKey, id, from, score, scoreEl);
      else {
        scoreEl.textContent = formatScore(score);
        dispScore[divKey][id] = score;
      }
    }

    row.dataset.rank = rank == null ? 'unranked' : String(rank);
    row.querySelector('.rank-num').textContent = rank == null ? '-' : rank;

    const previous = prevRank[divKey][id];
    const deltaEl = row.querySelector('.rank-delta');
    if (rank == null) {
      // 0점 팀은 순위 변동 표시도 비워 둔다.
      deltaEl.className = 'rank-delta eq';
      deltaEl.textContent = '';
    } else if (previous == null || previous === rank) {
      deltaEl.className = 'rank-delta eq';
      deltaEl.textContent = '—';
    } else if (rank < previous) {
      deltaEl.className = 'rank-delta up';
      deltaEl.textContent = '▲' + (previous - rank);
      row.classList.remove('flash');
      void row.offsetWidth;
      row.classList.add('flash');
      setTimeout(() => row.classList.remove('flash'), 900);
    } else {
      deltaEl.className = 'rank-delta dn';
      deltaEl.textContent = '▼' + (rank - previous);
    }

    container.appendChild(row);
  });

  const last = snapCol(container);
  const reordered = {};
  container.querySelectorAll('.row[data-id]').forEach(el => { reordered[el.dataset.id] = el; });

  Object.keys(last).forEach(id => {
    const el = reordered[id];
    if (!el) return;
    const dy = (first[id] ?? last[id]) - last[id];
    if (Math.abs(dy) < 0.5) return;

    el.style.transition = 'none';
    el.style.transform = `translateY(${dy}px)`;
    requestAnimationFrame(() => {
      el.style.transition = 'transform 0.55s cubic-bezier(0.22,1,0.36,1)';
      el.style.transform = '';
    });
  });

  previousRankedScore = null;
  competitionRank = 0;
  list.forEach((team, index) => {
    const score = team.total;
    if (score <= 0) {
      prevRank[divKey][team.id] = null;
      return;
    }
    if (previousRankedScore === null || score !== previousRankedScore) {
      competitionRank = index + 1;
    }
    prevRank[divKey][team.id] = competitionRank;
    previousRankedScore = score;
  });
}

function scoresText(team) {
  const prefix = team.number ? team.number + ' · ' : '';
  return `${prefix}M1:${formatScore(team.m1)} M2-1:${formatScore(team.m21)} M2-2:${formatScore(team.m22)} M2-3:${formatScore(team.m23)}`;
}

function rowHTML(team, rank, score, pct) {
  const rankText = rank == null ? '-' : rank;
  const deltaText = rank == null ? '' : '—';
  return `
  <div class="rank-cell">
    <span class="rank-num">${rankText}</span>
    <span class="rank-delta eq">${deltaText}</span>
  </div>
  <div class="mid">
    <div class="t-name">${esc(team.name)}</div>
    <div class="t-scores">${esc(scoresText(team))}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="score-cell">
    <div class="score-val">${formatScore(score)}</div>
    <div class="score-lbl">pts</div>
  </div>`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   POLL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function tick() {
  if (busy || document.hidden) {
    scheduleNext();
    return;
  }

  busy = true;
  setStatus('busy', 'SYNCING');

  try {
    const data = await apiFetch();
    const elementary = data.elementary || [];
    const middle = data.middle || [];
    const allTeams = [...elementary, ...middle];

    renderCol('elem', 'col-elem', elementary);
    renderCol('midd', 'col-midd', middle);

    document.getElementById('s-teams').textContent = allTeams.length;
    document.getElementById('s-tick').textContent = ++ticks;
    setStatus('ok', 'LIVE');
  } catch (error) {
    console.error('[leaderboard]', error);
    setStatus('err', 'CONNECTION ERROR');
  } finally {
    busy = false;
    scheduleNext();
  }
}

function scheduleNext(delay = POLL_MS) {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(tick, delay);
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) scheduleNext(0);
});
window.addEventListener('beforeunload', () => clearTimeout(pollTimer));

setStatus('busy', 'CONNECTING');
tick();
</script>
</body>
</html>
